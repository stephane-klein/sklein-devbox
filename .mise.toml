[tools]
go="1.26.1"

[tasks.git-clone-chezmoi]
run = """
if [ -d "chezmoi" ]; then
    echo "Warning: ./chezmoi/ directory already exists."
else
    git clone https://github.com/stephane-klein/sklein-devbox-chezmoi.git chezmoi
fi
"""
description = "Clone the chezmoi configuration repository into ./chezmoi/"

[tasks.build-image]
run = "podman build -t sklein-devbox ."
description = "Build the sklein-devbox container image"

[tasks.build-cli]
run = "go build -o sklein-devbox ./cmd"
description = "Build the sklein-devbox CLI application"

[tasks.enter]
quiet = true
run = """
mkdir -p $(pwd)/.sklein-devbox-home
podman run -it --rm \
    --userns=keep-id \
    --cap-add=SETUID \
    --cap-add=SETGID \
    -e TERM \
    -e SKLEIN_DEVBOX_NAME=sklein-devbox \
    -v $(pwd):/workspace:U \
    -v $(pwd)/.sklein-devbox-home:/home/sklein:U \
    -v $(pwd)/chezmoi:/home/sklein/.local/share/chezmoi:U \
    -v $(pwd)/entrypoint.sh:/usr/local/bin/entrypoint.sh:U \
    sklein-devbox
"""
description = "Enter the sklein-devbox container shell"

[tasks.console]
quiet = true
run = """
alacritty -e podman run -it --rm \
    --label=app=sklein-devbox \
    --userns=keep-id \
    --cap-add=SETUID \
    --cap-add=SETGID \
    -e TERM \
    -e SKLEIN_DEVBOX_NAME=sklein-devbox \
    -v $(pwd):/workspace:U \
    -v $(pwd)/.sklein-devbox-home:/home/sklein:U \
    -v $(pwd)/chezmoi:/home/sklein/.local/share/chezmoi:U \
    -v $(pwd)/entrypoint.sh:/usr/local/bin/entrypoint.sh:U \
    sklein-devbox \
    /bin/zsh -i -c "tmux new-session -A -s devbox"
"""
description = "Open Alacritty with a tmux session in the devbox container"

[tasks.clean-home]
run = "rm -rf $(pwd)/.sklein-devbox-home"
description = "Remove the container home directory to reset the development environment"

[tasks.fresh-enter]
run = "mise clean-home && mise enter"
description = "Clean the container home and enter the container (fresh start)"

[tasks.create-version-tag]
description = "Compute next trunkver version, create git tag, and push to remote"
run = "bash scripts/compute-version.sh"

[tasks.build-rpm]
run = """
VERSION=$(git describe --tags --abbrev=0 | cut -d'-' -f1)
COMMIT_SHA=$(git rev-parse --short HEAD)
FULL_VERSION="${VERSION}-${COMMIT_SHA}"
mkdir -p rpmbuild/SOURCES rpmbuild/SPECS rpmbuild/SRPMS rpmbuild/RPMS
cp rpm/sklein-devbox.spec rpmbuild/SPECS/
git archive --format tar.gz --prefix sklein-devbox-${VERSION}/ --output rpmbuild/SOURCES/sklein-devbox-${VERSION}.tar.gz HEAD
rpmbuild -ba \
    --define "version ${VERSION}" \
    --define "fullver ${FULL_VERSION}" \
    --define "_topdir $(pwd)/rpmbuild" \
    rpmbuild/SPECS/sklein-devbox.spec
"""
description = "Build RPM package locally"

[tasks.build-srpm]
run = """
VERSION=$(git describe --tags --abbrev=0 | cut -d'-' -f1)
COMMIT_SHA=$(git rev-parse --short HEAD)
FULL_VERSION="${VERSION}-${COMMIT_SHA}"
mkdir -p rpmbuild/SOURCES rpmbuild/SPECS rpmbuild/SRPMS rpmbuild/RPMS
cp rpm/sklein-devbox.spec rpmbuild/SPECS/
git archive --format tar.gz --prefix sklein-devbox-${VERSION}/ --output rpmbuild/SOURCES/sklein-devbox-${VERSION}.tar.gz HEAD
rpmbuild -bs \
    --define "version ${VERSION}" \
    --define "fullver ${FULL_VERSION}" \
    --define "_topdir $(pwd)/rpmbuild" \
    rpmbuild/SPECS/sklein-devbox.spec
"""
description = "Build SRPM package"

[tasks.release]
run = "mise run create-version-tag"
description = "Create version tag (COPR auto-triggers build via webhook)"

[tasks.copr-build]
run = """
copr-cli build-package stephaneklein/sklein-devbox \
  --name sklein-devbox \
  --commit main
"""
description = "Build package on COPR (manual trigger)"

[tasks.copr-create]
run = """
if ! copr-cli get sklein-devbox > /dev/null 2>&1; then
  copr-cli create sklein-devbox \
    --enable-net on \
    --chroot fedora-42-x86_64 \
    --chroot fedora-43-x86_64 \
    --chroot fedora-44-x86_64
fi

if ! copr-cli get-package sklein-devbox --name sklein-devbox > /dev/null 2>&1; then
  copr-cli add-package-scm stephaneklein/sklein-devbox \
    --name sklein-devbox \
    --clone-url https://github.com/stephane-klein/sklein-devbox.git \
    --subdir . \
    --spec rpm/sklein-devbox.spec \
    --method make_srpm \
    --webhook-rebuild on
else
  copr-cli edit-package-scm stephaneklein/sklein-devbox \
    --name sklein-devbox \
    --clone-url https://github.com/stephane-klein/sklein-devbox.git \
    --subdir . \
    --spec rpm/sklein-devbox.spec \
    --method make_srpm \
    --webhook-rebuild on
fi
"""
description = "Create COPR project with SCM package configuration (idempotent)"

[tasks.clean-rpmbuild]
run = "rm -rf rpmbuild"
description = "Clean rpmbuild directory"
