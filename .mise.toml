[tools]
go="1.26.1"

[tasks.git-clone-chezmoi]
run = """
if [ -d "chezmoi" ]; then
    echo "Warning: ./chezmoi/ directory already exists."
else
    git clone https://github.com/stephane-klein/sklein-devbox-chezmoi.git chezmoi
fi
"""
description = "Clone the chezmoi configuration repository into ./chezmoi/"

[tasks.build-image]
run = "podman build -t sklein-devbox ."
description = "Build the sklein-devbox container image"

[tasks.build-cli]
run = "go build -o sklein-devbox ./cmd"
description = "Build the sklein-devbox CLI application"

[tasks.enter]
quiet = true
run = """
mkdir -p $(pwd)/.sklein-devbox-home
podman run -it --rm \
    --userns=keep-id \
    --cap-add=SETUID \
    --cap-add=SETGID \
    -e TERM \
    -e SKLEIN_DEVBOX_NAME=sklein-devbox \
    -v $(pwd):/workspace:U \
    -v $(pwd)/.sklein-devbox-home:/home/sklein:U \
    -v $(pwd)/chezmoi:/home/sklein/.local/share/chezmoi:U \
    -v $(pwd)/entrypoint.sh:/usr/local/bin/entrypoint.sh:U \
    sklein-devbox
"""
description = "Enter the sklein-devbox container shell"

[tasks.console]
quiet = true
run = """
alacritty -e podman run -it --rm \
    --label=app=sklein-devbox \
    --userns=keep-id \
    --cap-add=SETUID \
    --cap-add=SETGID \
    -e TERM \
    -e SKLEIN_DEVBOX_NAME=sklein-devbox \
    -v $(pwd):/workspace:U \
    -v $(pwd)/.sklein-devbox-home:/home/sklein:U \
    -v $(pwd)/chezmoi:/home/sklein/.local/share/chezmoi:U \
    -v $(pwd)/entrypoint.sh:/usr/local/bin/entrypoint.sh:U \
    sklein-devbox \
    /bin/zsh -i -c "tmux new-session -A -s devbox"
"""
description = "Open Alacritty with a tmux session in the devbox container"

[tasks.clean-home]
run = "rm -rf $(pwd)/.sklein-devbox-home"
description = "Remove the container home directory to reset the development environment"

[tasks.fresh-enter]
run = "mise clean-home && mise enter"
description = "Clean the container home and enter the container (fresh start)"

[tasks.create-version-tag]
description = "Create version tag locally (requires clean main branch and new commits)"
run = """
bash scripts/check-repo-state.sh

# Check if there are new commits since the last tag
LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
if [[ -n "$LATEST_TAG" ]]; then
    TAG_COMMIT=$(git rev-parse "$LATEST_TAG^{}")
    HEAD_COMMIT=$(git rev-parse HEAD)
    if [[ "$TAG_COMMIT" == "$HEAD_COMMIT" ]]; then
        echo "Error: Current commit already has a tag ($LATEST_TAG)." >&2
        echo "Make a new commit before creating another release." >&2
        exit 1
    fi
fi

date_prefix=$(date +%Y%m%d)
existing_tags=$(git tag -l "${date_prefix}.*")
count=0
if [[ -n "$existing_tags" ]]; then
    count=$(echo "$existing_tags" | wc -l)
fi
VERSION="${date_prefix}.${count}.0"
COMMIT_SHA=$(git rev-parse --short HEAD)
TAG_NAME="${VERSION}-${COMMIT_SHA}"
git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
echo "Created tag: $TAG_NAME"
"""

[tasks.build-rpm]
run = """
read VERSION COMMIT_SHA FULL_VERSION <<< $(bash scripts/prepare-srpm-build.sh HEAD)
rpmbuild -ba --define "_topdir $(pwd)/rpmbuild" rpmbuild/SPECS/sklein-devbox.spec
"""
description = "Build RPM package locally"

[tasks.build-srpm]
run = """
read VERSION COMMIT_SHA FULL_VERSION <<< $(bash scripts/prepare-srpm-build.sh HEAD)
rpmbuild -bs --define "_topdir $(pwd)/rpmbuild" rpmbuild/SPECS/sklein-devbox.spec
"""
description = "Build SRPM package"

[tasks.release]
run = """
mise run create-version-tag
echo ""
echo "========================================"
echo "Tag created and pushed successfully!"
echo ""
echo "To publish the RPM packages on COPR, run:"
echo "  mise run build-srpm-and-upload-to-copr"
echo "========================================"
"""
description = "Create version tag and remind to publish on COPR"

[tasks.build-srpm-and-upload-to-copr]
description = "Build SRPM from latest tag and upload to COPR"
run = """
bash scripts/check-repo-state.sh

LATEST_TAG=$(git describe --tags --abbrev=0)
CURRENT_COMMIT=$(git rev-parse HEAD)
TAG_COMMIT=$(git rev-parse "$LATEST_TAG^{}")

if [[ "$CURRENT_COMMIT" != "$TAG_COMMIT" ]]; then
    echo "Error: Current HEAD does not match the latest tag ($LATEST_TAG)." >&2
    echo "You must create a tag first with: mise run create-version-tag" >&2
    exit 1
fi

read VERSION COMMIT_SHA FULL_VERSION <<< $(bash scripts/prepare-srpm-build.sh "$LATEST_TAG")

echo "Building SRPM for version: ${VERSION}"
echo "Full version: ${FULL_VERSION}"

rm -rf rpmbuild/SRPMS/*.src.rpm
rpmbuild -bs --define "_topdir $(pwd)/rpmbuild" rpmbuild/SPECS/sklein-devbox.spec

SRPM_FILE=$(ls -1 rpmbuild/SRPMS/*.src.rpm | head -1)
echo "SRPM built: ${SRPM_FILE}"

echo "Uploading to COPR..."
copr-cli build stephaneklein/sklein-devbox "${SRPM_FILE}"

echo "Done! COPR will now build and publish the RPM packages."
"""

[tasks.copr-create]
run = """
if ! copr-cli get sklein-devbox > /dev/null 2>&1; then
  copr-cli create sklein-devbox \
    --enable-net on \
    --chroot fedora-42-x86_64 \
    --chroot fedora-43-x86_64 \
    --chroot fedora-44-x86_64
fi
"""
description = "Create COPR project"

[tasks.clean-rpmbuild]
run = "rm -rf rpmbuild"
description = "Clean rpmbuild directory"
